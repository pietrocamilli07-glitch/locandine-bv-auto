name: Pubblica storie Instagram

# Controlla da solo ogni ~15 minuti i link in tappe.txt e pubblica le partite appena concluse.
# Si puo' avviare anche a mano dal sito / da Actions -> "Run workflow" incollando i link:
# in quel caso il link viene anche SALVATO in tappe.txt e resta sotto controllo per tutto il giorno.
on:
  workflow_dispatch:
    inputs:
      tappe:
        description: "Link tappe (uno per riga o separati da virgola). Vuoto = usa tappe.txt"
        required: false
        default: ""
  schedule:
    - cron: "*/15 * * * *"

# Un solo run alla volta: evita doppie pubblicazioni.
concurrency:
  group: pubblica-storie
  cancel-in-progress: false

permissions:
  contents: write   # per committare grafiche e stato nel repo

jobs:
  pubblica:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installa dipendenze
        run: npm ci

      - name: Salva il link di stamattina nella watch-list (tappe.txt)
        if: ${{ github.event.inputs.tappe != '' }}
        env:
          TAPPE_IN: ${{ github.event.inputs.tappe }}
        run: |
          printf '%s\n' "$TAPPE_IN" | tr ',;' '\n' | sed 's/[[:space:]]//g' | sed '/^$/d' > tappe.txt
          git config user.name "bv-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tappe.txt
          if git diff --cached --quiet; then
            echo "Watch-list invariata."
          else
            git commit -m "watch-list: tappa di oggi [skip ci]"
            git push
          fi

      - name: Genera le grafiche nuove
        run: node publish-gh.mjs render
        env:
          TAPPA_URLS: ${{ github.event.inputs.tappe }}
          ROUNDS_REGEX: ${{ vars.ROUNDS_REGEX }}
          MAX_PER_RUN: ${{ vars.MAX_PER_RUN }}

      - name: Pubblica le grafiche su GitHub (URL pubblico per Instagram)
        run: |
          git config user.name "bv-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add published 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nessuna grafica nuova."
          else
            git commit -m "grafiche nuove [skip ci]"
            git push
          fi

      - name: Attendi la propagazione delle immagini
        run: sleep 6

      - name: Pubblica le Storie su Instagram
        run: node publish-gh.mjs publish
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ vars.DRY_RUN }}

      - name: Salva lo stato (anti-doppioni)
        run: |
          git config user.name "bv-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Stato invariato."
          else
            git commit -m "stato aggiornato [skip ci]"
            git push
          fi
